<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"> 
  <title>Study2Gether | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4A90E2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/pages.css">
  <link rel="stylesheet" href="./css/responsive.css">

  <style>
    /* =========================================
       1. VARIÁVEIS E TOKENS
       ========================================= */
    :root {
      --brand-blue:   #3A7BFF;
      --brand-green:  #3ED1A5;
      --brand-purple: #6A4DFF;
      --danger:       #EF4444;
      --bg:           #F7F9FC;
      --panel:        #FFFFFF;
      --border:       #E3E8EF;
      --hover:        #F1F5FF;
      --text:         #1F2A37;
      --text-2:       #6B7280;
      --space-xs:     0.25rem;
      --space-sm:     0.5rem;
      --space-md:     1rem;
      --space-lg:     1.5rem;
      --ft-sm:        0.875rem;
      --ft-base:      1rem;
      --ft-xl:        2rem;
      --r-xs:         6px;
      --r-sm:         8px;
      --shadow-sm:    0 6px 18px rgba(0,0,0,.05);
      --grad:         linear-gradient(135deg, var(--brand-purple), var(--brand-blue), var(--brand-green));
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:         #0B0E14;
        --panel:      #151921;
        --border:     #2D333D;
        --text:       #F5F7FA;
        --text-2:     #949BA4;
      }
    }

    /* =========================================
       2. RESET E ESTILOS BÁSICOS
       ========================================= */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: var(--ft-base);
      color: var(--text);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* =========================================
       3. COMPONENTES DO LOGIN
       ========================================= */
    .login-wrapper { width: 100%; max-width: 400px; padding: var(--space-md); }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      box-shadow: var(--shadow-sm);
      padding: var(--space-lg);
      transition: all 0.3s ease;
    }

    .brand {
      display: flex; justify-content: center;
      font-size: var(--ft-xl); margin-bottom: var(--space-xs);
    }
   .brand__study {
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text; 
      color: transparent;
      font-weight: 800;
    }
    .brand__rest { color: var(--text); font-weight: 800; }

    .login-subtitle { text-align: center; color: var(--text-2); font-size: var(--ft-sm); margin-bottom: var(--space-lg); }

    label { display: block; margin: var(--space-sm) 0 var(--space-xs); color: var(--text-2); font-size: var(--ft-sm); font-weight: 500; }
    
    input {
      width: 100%; padding: 12px; font-family: inherit; font-size: var(--ft-sm);
      border: 1px solid var(--border); border-radius: var(--r-xs);
      background: var(--bg); color: var(--text); margin-bottom: var(--space-sm);
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    input:focus { outline: none; border-color: var(--brand-blue); box-shadow: 0 0 0 3px rgba(58, 123, 255, 0.15); }

    button {
      width: 100%; font-family: inherit; font-size: var(--ft-base); font-weight: 600;
      padding: 12px; border: none; border-radius: var(--r-xs); cursor: pointer;
      transition: all .15s ease; margin-top: var(--space-sm);
    }

    .btn-primary { background: var(--brand-blue); color: #FFFFFF; }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-2px); }

    .btn-outline { background: transparent; border: 1px solid var(--brand-blue); color: var(--brand-blue); margin-top: 8px;}
    .btn-outline:hover { background: rgba(58, 123, 255, 0.05); }

    .login-footer { text-align: center; margin-top: var(--space-md); font-size: var(--ft-sm); color: var(--text-2); }
    .login-footer a { color: var(--brand-blue); text-decoration: none; font-weight: 600; cursor: pointer; }
    .login-footer a:hover { text-decoration: underline; }

    #msg-erro { color: var(--danger); font-size: var(--ft-sm); text-align: center; margin-top: var(--space-sm); display: none; }
    
    /* Classe para esconder elementos dinamicamente com JS */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="card" id="login-card">
      
      <h1 class="brand"><span class="brand__study">Study</span><span class="brand__rest">2Gether</span></h1>
      <p class="login-subtitle" id="form-title">Faça login para acessar sua conta</p>

      <form id="form-login">
        <label for="nome">Nome de Usuário ou E-mail</label>
        <input type="text" id="nome" placeholder="ex: Cloud ou seu@email.com" required>

        <div id="box-email" class="hidden">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com">
        </div>

        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="••••••••" required>

        <p id="msg-erro"></p>

        <button type="submit" class="btn-primary" id="btn-submit">Entrar na Plataforma</button>
        <button type="button" class="btn-outline" id="btn-visitante">Entrar como Visitante</button>
      </form>

      <div class="login-footer">
        <span id="footer-text">Não tem uma conta?</span> <a id="btn-toggle-mode">Criar conta rápida</a>
      </div>

    </div>
  </div>

  <script src="./js/db.js"></script>
  
  <script>
    const db = window.db;

    // ==========================================
    // 2. LÓGICA DE INTERAÇÃO (LOGIN / CADASTRO / VISITANTE)
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
      let modoCriarConta = false; // Controle de estado (Login ou Registro)

      // Elementos da interface
      const formLogin = document.getElementById('form-login');
      const boxEmail = document.getElementById('box-email');
      const inputEmail = document.getElementById('email');
      const btnSubmit = document.getElementById('btn-submit');
      const btnVisitante = document.getElementById('btn-visitante');
      const formTitle = document.getElementById('form-title');
      const footerText = document.getElementById('footer-text');
      const btnToggleMode = document.getElementById('btn-toggle-mode');
      const msgErro = document.getElementById('msg-erro');

      // --- EFEITO UAU: Alternar entre Login e Criar Conta ---
      btnToggleMode.addEventListener('click', (e) => {
          e.preventDefault();
          modoCriarConta = !modoCriarConta;
          msgErro.style.display = 'none'; // Limpa erros anteriores

          if (modoCriarConta) {
              // Modo CADASTRO
              boxEmail.classList.remove('hidden');
              inputEmail.required = true;
              formTitle.innerText = "Crie sua conta para começar";
              btnSubmit.innerText = "Salvar e Entrar";
              footerText.innerText = "Já tem uma conta?";
              btnToggleMode.innerText = "Fazer Login";
              btnVisitante.classList.add('hidden'); // Esconde visitante no cadastro
          } else {
              // Modo LOGIN
              boxEmail.classList.add('hidden');
              inputEmail.required = false;
              formTitle.innerText = "Faça login para acessar sua conta";
              btnSubmit.innerText = "Entrar na Plataforma";
              footerText.innerText = "Não tem uma conta?";
              btnToggleMode.innerText = "Criar conta rápida";
              btnVisitante.classList.remove('hidden'); // Mostra visitante no login
          }
      });

      // --- SUBMIT DO FORMULÁRIO (Login ou Criar) ---
      formLogin.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const nome = document.getElementById('nome').value.trim();
        const senha = document.getElementById('senha').value.trim();
        const email = document.getElementById('email').value.trim();
        
        try {
          const usuarios = await db.buscarTodos();

          if (modoCriarConta) {
              // LÓGICA DE CRIAR CONTA (Com travas de segurança)
              const usuarioExiste = usuarios.find(u =>
                  (u.nome && u.nome.toLowerCase() === nome.toLowerCase()) ||
                  (u.email && u.email.toLowerCase() === email.toLowerCase())
              );
              
              if (usuarioExiste) {
                  msgErro.style.display = 'block';
                  msgErro.innerText = (usuarioExiste.email && usuarioExiste.email.toLowerCase() === email.toLowerCase())
                      ? "Este e-mail já está em uso."
                      : "Este nome de usuário já está em uso.";
                  return;
              }

              // Salva os dados completos no Banco
              const novoUsuario = {
                  nome: nome,
                  email: email,
                  senha: senha,
                  status: "Novo Estudante",
                  nivelXP: 1,
                  dataCriacao: new Date().toLocaleDateString('pt-BR')
              };

              const id = await db.adicionar(novoUsuario);
              novoUsuario.id = id;

              // Emite o Crachá e entra no sistema
              localStorage.setItem('estudante_logado', JSON.stringify(novoUsuario));
              alert(`Cadastro concluído! Bem-vindo(a), ${nome}!`);
              window.location.href = 'home.html'; // Redirecionar para home

          } else {
              // LÓGICA DE LOGIN (Com travas de segurança)
              const usuario = usuarios.find(u =>
                  (
                      (u.nome && u.nome.toLowerCase() === nome.toLowerCase()) || 
                      (u.email && u.email.toLowerCase() === nome.toLowerCase())
                  ) && u.senha === senha
              );

              if (usuario) {
                  // Entra no sistema
                  localStorage.setItem('estudante_logado', JSON.stringify(usuario));
                  window.location.href = 'home.html'; 
              } else {
                  msgErro.style.display = 'block';
                  msgErro.innerText = "Nome/e-mail ou senha incorretos. Verifique seus dados.";
              }
          }
        } catch (erro) {
          console.error("Erro no sistema:", erro);
        }
      });

      // --- ENTRAR COMO VISITANTE ---
      btnVisitante.addEventListener('click', () => {
          const visitante = {
              nome: "Visitante",
              email: "visitante@study2gether.com",
              status: "Explorando a plataforma",
              nivelXP: 0,
              id: 9999 // ID fictício
          };
          
          localStorage.setItem('estudante_logado', JSON.stringify(visitante));
          window.location.href = 'home.html'; 
      });

    });
  </script>
</body>
</html>
